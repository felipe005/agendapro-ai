services:
  - type: web
    name: catwalk-ai-studio
    env: node
    rootDir: .
    buildCommand: npm run build:render
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FAL_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
